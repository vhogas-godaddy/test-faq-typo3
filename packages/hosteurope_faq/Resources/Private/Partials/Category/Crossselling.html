{namespace v=FluidTYPO3\Vhs\ViewHelpers}
<div class="row">
    <div class="small-12 small-centered columns">
        <div class="row">
            <f:for each="{teaser_objects}" as="teaser_object" iteration="iteration">
                <style>
                    #r<f:format.raw>{record.uid}</f:format.raw>t<f:format.raw>{iteration.cycle}</f:format.raw> .cross-selling-teaser{background-image: url("<f:format.raw>{v:uri.image(src:teaser_object.image.uid,relative:0,treatIdAsReference:1)}</f:format.raw>");<f:format.raw>{teaser_object.imagecss}</f:format.raw>}
                </style>
                <div class="small-12 large-6 columns" id="r{record.uid}t{iteration.cycle}">
                    <div class="cross-selling-teaser {teaser_object.textpadding}">
                        <div class="inner-header" data-mh="cst-title">
                            <h3>{teaser_object.headline->f:format.raw()}</h3>
                        </div>
                        <div class="inner-content" data-mh="cst-content">
                            {teaser_object.content->f:format.html()}
                        </div>
                        <f:if condition="{teaser_object.linkLabel}">
                            <div class="inner-cta text-center">
                                <a href="{v:uri.typolink(configuration:'{parameter: teaser_object.link}')}" target="{teaser_object.linkTarget}" title="{teaser_object.linkTitle}" class="ui button">{teaser_object.linkLabel}</a>
                            </div>
                        </f:if>
                    </div>
                </div>
            </f:for>
        </div>
    </div>
</div>
