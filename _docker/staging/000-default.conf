<VirtualHost *:8080>
  ServerName https://storefront.hosteurope.de
  ServerAdmin webmaster@localhost
  DocumentRoot /var/www/public

  SetEnv TYPO3_CONTEXT Production
  SetEnv HTTP_HOST www.hosteurope.de

  SetEnv DOCKER_DEVELOP_BOX ${DOCKER_DEVELOP_BOX}
  SetEnv DATABASE_NAME ${DATABASE_NAME}
  SetEnv DATABASE_HOST ${DATABASE_HOST}
  SetEnv DATABASE_USERNAME ${DATABASE_USERNAME}
  SetEnv DATABASE_PASSWORD ${DATABASE_PASSWORD}
  SetEnv CD_CLIENT_ID ${CD_CLIENT_ID}
  SetEnv CD_CLIENT_SECRET ${CD_CLIENT_SECRET}
  SetEnv PPE_CLIENT_ID ${PPE_CLIENT_ID}
  SetEnv PPE_CLIENT_SECRET ${PPE_CLIENT_SECRET}
  SetEnv PPE_USERNAME ${PPE_USERNAME}
  SetEnv PPE_PASSWORD ${PPE_PASSWORD}


  DirectoryIndex index.php

  <Directory /var/www/public>
    Options Indexes FollowSymLinks MultiViews
    AllowOverride All
    Require all granted
    Order allow,deny
    allow from all
  </Directory>
</VirtualHost>